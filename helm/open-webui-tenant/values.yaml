# =============================================================================
# Open WebUI Tenant - Helm Values
# =============================================================================
# This chart deploys per-tenant:
# - Open WebUI (main application)
# - PostgreSQL (application database)
# - Weaviate (vector database)
#
# Shared services (Gateway, SearXNG, Crawl4AI, Reranker) are deployed
# separately via the gradient-gateway chart.
# =============================================================================

# -----------------------------------------------------------------------------
# Tenant Identification
# -----------------------------------------------------------------------------
tenant:
  name: ""           # Required: e.g., "demo", "client-a"
  domain: ""         # Required: e.g., "demo.soev.ai"
  clientName: ""     # Display name for the client/org, e.g., "Gradient", "Kwink"

# -----------------------------------------------------------------------------
# Shared Services Configuration (deployed separately)
# -----------------------------------------------------------------------------
sharedServices:
  namespace: shared-services
  gateway:
    host: gradient-gateway
    port: 8000
  reranker:
    host: reranker
    port: 8000

# -----------------------------------------------------------------------------
# Observability Configuration
# -----------------------------------------------------------------------------
observability:
  namespace: observability
  searxng:
    host: searxng
    port: 8080

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------
global:
  # Image pull secrets for private registries
  imagePullSecrets: []
  # Storage class for all PVCs (leave empty for default)
  storageClass: ""

# -----------------------------------------------------------------------------
# Open WebUI
# -----------------------------------------------------------------------------
openWebui:
  enabled: true

  image:
    repository: ghcr.io/gradient-ds/open-webui
    tag: main  # Override per environment: dev, test, main, or pinned version (e.g., v1.0.0)
    pullPolicy: Always

  replicaCount: 1

  # Deployment strategy. Default is Recreate because the chart defaults to
  # persistence.enabled=true with a RWO PVC — RollingUpdate would cause
  # Multi-Attach errors. Multi-replica tenants should set persistence.enabled=false
  # and override to RollingUpdate with maxSurge=1, maxUnavailable=0.
  strategy:
    type: Recreate

  # Service configuration
  service:
    type: ClusterIP
    port: 8080

  # Resource limits — no CPU limit (throttling under burst hurts UX);
  # memory limit kept to bound OOM blast radius per pod.
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"

  # Persistent storage for data
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    # existingClaim: ""  # Use existing PVC (for migrations)

  # Health checks
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10

  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  startupProbe:
    enabled: true
    failureThreshold: 30
    periodSeconds: 10

  # ---------------------------------------------------------------------------
  # Alembic migration Job (Helm pre-upgrade hook)
  # ---------------------------------------------------------------------------
  # When enabled, a one-shot Job runs `import open_webui.config` before each
  # helm upgrade. That triggers run_migrations() at import time against
  # Postgres, then exits. Helm only proceeds to roll the new Deployment if
  # the Job succeeds — so the new pods start against an already-migrated
  # schema and don't race each other.
  #
  # The main Deployment sets ENABLE_DB_MIGRATIONS=false when this is on,
  # so no replica attempts its own migration at startup.
  #
  # Required for replicaCount > 1. Leave off for single-replica tenants that
  # rely on the default "first pod migrates" behavior.
  migrationJob:
    enabled: false
    activeDeadlineSeconds: 600
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"

  # ---------------------------------------------------------------------------
  # PodDisruptionBudget
  # ---------------------------------------------------------------------------
  # Only meaningful with replicaCount > 1. Leave disabled for single-replica
  # tenants (a PDB with minAvailable=1 would block all voluntary disruptions).
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1   # use this OR minAvailable, not both

  # ---------------------------------------------------------------------------
  # Topology Spread Constraints
  # ---------------------------------------------------------------------------
  # Spread pods across nodes to survive single-node failures. Use with
  # replicaCount > 1. ScheduleAnyway (soft) is recommended so pods still
  # schedule on small clusters; DoNotSchedule (hard) blocks if the skew
  # can't be satisfied.
  topologySpreadConstraints: []
  # Example:
  # topologySpreadConstraints:
  #   - maxSkew: 1
  #     topologyKey: kubernetes.io/hostname
  #     whenUnsatisfiable: DoNotSchedule
  #     labelSelector:
  #       matchLabels:
  #         app.kubernetes.io/component: open-webui

  # ---------------------------------------------------------------------------
  # Open WebUI Configuration
  # ---------------------------------------------------------------------------
  config:
    # Deployment
    env: "prod"
    # Persist admin-UI configuration (integration providers, connections, etc.)
    # in the tenant DB. Aligns with OWUI's own default (ENABLE_PERSISTENT_CONFIG
    # defaults to true upstream). The earlier chart default of "false" + reset-
    # on-start "true" wiped the config table on every rollout, which deletes
    # admin-only resources like integration providers — they have no env-var
    # equivalent to fall back on. Trade-off: env-var changes for admin-visible
    # settings (openaiApiBaseUrl, embedding model, etc.) become DB-shadowed
    # after first boot. To roll such a change via Helm, set
    # resetConfigOnStart: "true" for one reconcile cycle, then flip back —
    # see tenants/CLAUDE.md "Open WebUI persistent_config pitfall".
    enablePersistentConfig: "true"
    resetConfigOnStart: "false"
    webuiName: "soev.ai"
    corsAllowOrigin: ""  # Empty = defaults to https://<tenant.domain>. Override for additional origins.

    # Locale
    defaultLocale: "nl-NL"

    # Authentication
    webuiAuth: "true"
    enableSignup: "false"
    enableLoginForm: "true"
    enableInitialAdminSignup: "true"
    defaultUserRole: "user"
    enableOauthSignup: "false"
    oauthInviteRequired: "false"
    oauthMergeAccountsByEmail: "true"
    enablePasswordAuth: "true"
    jwtExpiresIn: "4w"

    # Microsoft OAuth / EntraID SSO
    # These can be left empty to disable Microsoft SSO
    microsoftClientId: ""
    # microsoftClientSecret is set via secrets
    microsoftClientTenantId: ""
    microsoftRedirectUri: ""
    microsoftOauthScope: "openid email profile"
    openidProviderUrl: ""

    # LLM Providers
    enableOllamaApi: "false"
    openaiApiBaseUrl: "https://router.huggingface.co/v1"
    # Forward user identity headers to upstream LLM API (required for LiteLLM per-user tracking)
    enableForwardUserInfoHeaders: "false"
    forwardUserInfoHeaderUserId: "X-OpenWebUI-User-Id"  # Header name for user UUID forwarding

    # Vector Database (Weaviate) - uses local Weaviate in tenant namespace
    vectorDb: "weaviate"
    weaviateHttpPort: "8080"
    weaviateGrpcPort: "50051"
    weaviateWebSearchTtlMinutes: "1440"  # TTL for web search vector collections (24 hours)

    # Database (PostgreSQL) - uses local PostgreSQL in tenant namespace
    databaseType: "postgresql"
    databaseUser: "openwebui"
    databasePort: "5432"
    databaseName: "openwebui"

    # RAG Embeddings
    ragEmbeddingEngine: "openai"
    ragEmbeddingModel: "text-embedding-3-small"
    ragEmbeddingBatchSize: "100"
    ragTopK: "15"
    ragTopKReranker: "10"
    ragRelevanceThreshold: "0.0"
    chunkSize: "2000"
    chunkOverlap: "200"
    ragHybridBm25Weight: "0.5"
    enableRagHybridSearch: "true"
    ragAllowedFileExtensions: "pdf,txt,md,docx,csv,json,xlsx"

    # File Processing
    fileProcessingMaxConcurrent: "10"  # Max concurrent file processing tasks
    fileDownloadConcurrencyMultiplier: "3"  # Download concurrency = processing × this multiplier

    # Content Extraction & Reranking (via shared services)
    contentExtractionEngine: "external"
    ragRerankingEngine: "external"
    # externalDocumentLoaderApiKey is set via secrets
    # ragExternalRerankerApiKey is set via secrets
    # URLs are templated to use shared service names by default; set
    # externalDocumentLoaderUrl explicitly to bypass the helper (e.g. when
    # a tenant uses one shared-services namespace for LiteLLM/reranker and
    # another for the doc-processor + gateway).
    externalDocumentLoaderUrl: ""

    # Web Search (via shared Gateway)
    enableWebSearch: "true"
    webSearchEngine: "searxng"
    searxngLanguage: "nl"
    webSearchResultCount: "5"
    enableWebLoaderSslVerification: "true"
    webLoaderEngine: "external"

    # Feature Flags
    featureChatControls: "true"
    featureChatControlsSections: "files"  # Whitelist: files,valves,system_prompt,params (empty=all)
    featureCapture: "False"
    featureArtifacts: "False"
    featurePlayground: "False"
    featureChatOverview: "False"
    featureNotesAiControls: "False"
    featureVoice: "False"
    featureChangelog: "False"
    featureSystemPrompt: "False"
    featureModels: "True"
    featureKnowledge: "True"
    featurePrompts: "True"
    featureTools: "False"
    featureSkills: "False"
    featureBuiltinTools: "False"
    featureAdminEvaluations: "True"
    featureAdminFunctions: "False"
    featureAdminSettings: "True"
    featureAdminSettingsTabs: "models,tools,interface,db,email,acceptance,security"
    featureWebpageUrl: "True"
    featureReferenceChats: "True"
    featureInputMenu: "True"
    featureTemporaryChat: "True"
    featureToolServers: "False"
    featureTerminalServers: "False"

    # Welcome message (PersistentConfig — seed only; admins can toggle in UI)
    enableWelcomeMessage: "False"

    # PDF export
    useStylizedPdfExport: "False"  # Set to "True" to use old screenshot-based PDF export

    # Memories
    enableMemories: "true"

    # Notes
    enableNotes: "true"
    userPermissionsFeaturesNotes: "true"

    # Knowledge Base
    userPermissionsWorkspaceKnowledgeAccess: "true"

    # Code Execution (disabled)
    enableCodeInterpreter: "false"
    enableCodeExecution: "false"
    userPermissionsFeaturesCodeInterpreter: "false"

    # Document Writer
    enableDocumentWriter: "true"
    userPermissionsFeaturesDocumentWriter: "true"

    # DOCX export (chat / message / document Word downloads) — enabled by default;
    # set "false" per tenant to hide all .docx download buttons AND return 403
    # from /utils/chat/docx and /utils/document/docx.
    enableDocxExport: "true"

    # MCP/Tool Servers (disabled)
    enableDirectConnections: "false"
    userPermissionsFeaturesDirectToolServers: "false"

    # TTS/STT (disabled)
    userPermissionsChatTts: "false"
    userPermissionsChatStt: "false"
    userPermissionsChatCall: "false"

    # Workspace
    userPermissionsWorkspaceModelsAccess: "true"
    userPermissionsWorkspacePromptsAccess: "true"
    userPermissionsWorkspaceToolsAccess: "false"

    # Workspace Sharing (allow users to share with specific groups/individuals)
    userPermissionsWorkspaceModelsAllowSharing: "false"
    userPermissionsWorkspaceKnowledgeAllowSharing: "false"
    userPermissionsWorkspacePromptsAllowSharing: "false"
    userPermissionsWorkspaceToolsAllowSharing: "false"
    userPermissionsWorkspaceSkillsAllowSharing: "false"
    userPermissionsNotesAllowSharing: "false"

    # Workspace Public Sharing (allow users to share with all tenant users)
    userPermissionsWorkspaceModelsAllowPublicSharing: "false"
    userPermissionsWorkspaceKnowledgeAllowPublicSharing: "false"
    userPermissionsWorkspacePromptsAllowPublicSharing: "false"
    userPermissionsWorkspaceToolsAllowPublicSharing: "false"
    userPermissionsWorkspaceSkillsAllowPublicSharing: "false"
    userPermissionsNotesAllowPublicSharing: "false"

    # Access Grants (allow sharing to individual users, not just groups)
    userPermissionsAccessGrantsAllowUsers: "true"

    # UI Features
    greetingTemplate: ""
    defaultPromptSuggestions: "[]"
    defaultModels: ""              # Comma-separated model IDs for new users (e.g., "model-a,model-b")
    enableFolders: "true"
    userPermissionsFeaturesFolders: "true"
    enableChannels: "false"
    userPermissionsFeaturesChannels: "false"
    enableCommunitySharing: "false"
    enableCitationRelevance: "true"
    enableMessageRating: "true"
    enableUserWebhooks: "false"
    enableAutocompleteGeneration: "false"
    enableFollowUpGeneration: "true"
    enableTitleGeneration: "true"
    enableTagsGeneration: "true"
    enableSearchQueryGeneration: "true"
    enableRetrievalQueryGeneration: "true"

    # Chat Permissions
    userPermissionsChatControls: "false"
    userPermissionsChatValves: "false"
    userPermissionsChatSystemPrompt: "true"
    userPermissionsChatParams: "false"
    userPermissionsChatFileUpload: "true"
    userPermissionsChatDelete: "true"
    userPermissionsChatDeleteMessage: "true"
    userPermissionsChatEdit: "true"
    userPermissionsChatShare: "true"
    userPermissionsChatExport: "true"
    userPermissionsChatContinueResponse: "true"
    userPermissionsChatRegenerateResponse: "true"
    userPermissionsChatRateResponse: "true"
    userPermissionsChatMultipleModels: "true"
    userPermissionsChatTemporary: "true"
    userPermissionsFeaturesWebSearch: "true"
    userPermissionsFeaturesImageGeneration: "false"
    userPermissionsFeaturesApiKeys: "false"

    # Admin
    enableAdminExport: "false"
    enableDataExport: "true"
    dataExportRetentionHours: "24"
    enableAdminChatAccess: "false"
    enableAdminWorkspaceContentAccess: "false"  # Disable admin seeing all prompts/models
    bypassAdminAccessControl: "false"  # Admin must follow access control
    showAdminDetails: "false"
    enableEvaluationArenaModels: "false"
    enableApiKeys: "false"
    enableImageGeneration: "false"
    imageGenerationEngine: "openai"
    imageGenerationModel: ""
    imagesOpenaiApiBaseUrl: ""
    imageSize: "1024x1024"
    # Google Drive Integration
    enableGoogleDriveIntegration: "false"
    googleDriveClientId: ""   # Google OAuth Client ID (for Picker + sync)

    # Google Drive Sync (for Knowledge Bases)
    enableGoogleDriveSync: "false"
    googleDriveSyncIntervalMinutes: "60"
    googleDriveMaxFilesPerSync: "500"
    googleDriveMaxFileSizeMb: "100"

    # OneDrive Integration
    enableOnedriveIntegration: "false"
    enableOnedrivePersonal: "false"
    enableOnedriveBusiness: "true"
    onedriveClientIdBusiness: ""  # Azure AD App Client ID
    onedriveSharepointUrl: ""     # e.g., "https://yourorg.sharepoint.com"
    onedriveSharepointTenantId: ""  # Azure AD Tenant ID

    # OneDrive Sync (for Knowledge Bases)
    enableOnedriveSync: "true"
    onedriveSyncIntervalMinutes: "15"
    onedriveMaxFilesPerSync: "250"
    onedriveMaxFileSizeMb: "10"

    # Confluence Integration (Atlassian Cloud OAuth)
    enableConfluenceIntegration: "false"
    confluenceOauthClientId: ""   # Atlassian OAuth 2.0 (3LO) Client ID
    # confluenceOauthClientSecret is set via secrets

    # Confluence Sync (for Knowledge Bases)
    enableConfluenceSync: "false"
    confluenceSyncIntervalMinutes: "60"
    confluenceMaxPagesPerSync: "500"
    confluenceMaxPageSizeMb: "25"

    # Knowledge Base File Limit
    knowledgeMaxFileCount: "250"

    # Shared-services loader-worker (per-tenant). When true, cloud-source sync
    # workers submit jobs to the loader-worker pod (loaderWorker.enabled=true)
    # instead of downloading + embedding in-process. See
    # thoughts/shared/plans/2026-04-25-shared-services-loader-worker.md.
    useSharedLoader: "false"
    # Override LOADER_WORKER_URL when loaderWorker.enabled=false (e.g. pointing
    # at a dev stack). When loaderWorker.enabled=true the URL is derived from
    # the in-namespace service.
    loaderWorkerUrl: ""

    # Email Invites (Microsoft Graph API)
    enableEmailInvites: "false"
    emailGraphTenantId: ""       # Azure AD Tenant ID for email app
    emailGraphClientId: ""       # Azure AD App Client ID for email
    # emailGraphClientSecret is set via secrets
    emailFromAddress: "no-reply@soev.ai"
    emailFromName: "Soev"
    inviteExpiryHours: "168"     # 7 days
    emailInviteSubject: ""       # Custom email subject (empty = default)
    emailInviteHeading: ""       # Custom email + invite page heading (empty = default)

    bypassModelAccessControl: "false"

    # Agent API (internal: routes chat UI to external agent service)
    agentApiEnabled: "false"
    agentApiBaseUrl: ""
    # agentApiKey is set via secrets (see .Values.secrets.agentApiKey)
    # Comma-separated list of agent identifiers the admin can select from in
    # the External Agents tab. When empty, the agents service uses its own
    # default_agent. When set, the admin's selection is forwarded as an
    # override hint in the payload.
    agentApiAgents: ""
    # [Gradient] Optional JSON array of default agent configs to seed at
    # startup. Each entry must include ``slug`` (must appear in
    # agentApiAgents) and ``name``. Optional fields: description, cta_copy,
    # profile_image_url, is_active (default false), is_beta (default true),
    # position. Existing rows in the DB are preserved unless
    # agentApiAgentsConfigOverwrite is true. ``access_grants`` are NOT
    # seedable — set them via the admin panel.
    # Example:
    #   agentApiAgentsConfig: |
    #     [
    #       {"slug": "soev_chat_autonomous", "name": "Soev.ai — autonomous",
    #        "description": "Autonomous knowledge assistant", "is_active": true},
    #       {"slug": "soev_chat_manual", "name": "Soev.ai — manual tools",
    #        "is_active": true, "position": 1}
    #     ]
    agentApiAgentsConfig: ""
    # When true, agent_config rows in the DB are overwritten on every boot
    # with the env values — admin edits will not persist. Use only when env
    # should be the source of truth.
    agentApiAgentsConfigOverwrite: "false"
    # [Gradient] User-facing default agent for the new-chat empty state.
    # When set to a slug in agentApiAgents, the agent picker pre-selects
    # that card on first load (no localStorage pick yet). Empty = no
    # pre-selection. Distinct from the admin override hint forwarded to
    # the agents service (set via Admin → External Agents).
    agentApiPickerDefaultSlug: ""
    # [Gradient] Master kill switch for the per-chat agent picker UI
    # (Settings → Agents admin tab + new-chat empty-state cards).
    # Layered on top of agentApiEnabled — both must be true for users to
    # see the agent picker. Default off so existing tenants are unaffected
    # until they explicitly opt in.
    featureAgentPicker: "false"

    # Agent Proxy (external: exposes agent API to external callers via /api/v1/agent/)
    enableAgentProxy: "false"

    # Search API (RAG discovery proxy: backend reverse-proxies to the upstream
    # search-api at /api/v1/discovery/*). The search-api X-API-Key is injected
    # server-side and never reaches the browser. Gated by ENABLE_RAG_FILTER_UI
    # (PersistentConfig — flip via admin UI; no separate helm flag).
    searchApi:
      # Upstream search-api base URL (e.g. http://neo-db:3535). Empty disables
      # the discovery proxy. Backend reads this as SEARCH_API_BASE_URL.
      baseUrl: ""
      # searchApiKey is set via secrets (see .Values.secrets.searchApiKey)

    # Two-Factor Authentication (TOTP)
    enable2fa: "false"
    require2fa: "false"
    twoFaGracePeriodDays: "7"

    # Security Headers (all enabled by default — set to "" to disable)
    securityHeaders:
      hsts: "max-age=31536000;includeSubDomains"
      xFrameOptions: "SAMEORIGIN"
      xContentType: "nosniff"
      referrerPolicy: "strict-origin-when-cross-origin"
      cacheControl: "no-store, max-age=0"

    # Cookie Security (true for all HTTPS deployments)
    cookieSecure: "true"

    # Audit Logging
    # Levels: NONE, METADATA, REQUEST, REQUEST_RESPONSE
    # METADATA logs who/what/when without PII from request/response bodies.
    # Emitted to stdout as JSON so the LGTM (Loki/Grafana/Tempo/Mimir) stack
    # can ingest without a file-log sidecar. Disable file sink since we run
    # stateless (no PVC) — audit.log would go to emptyDir and be lost anyway.
    auditLogLevel: "METADATA"
    enableAuditStdout: "true"
    enableAuditLogsFile: "false"
    # Structured JSON logs for Loki. Applies to the root logger (GLOBAL_LOG_LEVEL).
    logFormat: "json"

    # User Archival
    enableUserArchival: "true"
    defaultArchiveRetentionDays: "1095"  # 3 years (ISO 27001 compliance)
    enableAutoArchiveOnSelfDelete: "false"
    autoArchiveRetentionDays: "365"  # 1 year for self-deletions

    # Data Retention TTL (DPIA / GDPR storage limitation)
    # Set dataRetentionTtlDays > 0 to enable automated data cleanup
    dataRetentionTtlDays: "0"             # 0 = disabled (customers opt-in)
    userInactivityTtlDays: "0"            # 0 = inherit from master TTL
    chatRetentionTtlDays: "0"             # 0 = inherit from master TTL
    knowledgeRetentionTtlDays: "0"        # 0 = inherit from master TTL
    dataRetentionWarningDays: "30"        # Days before TTL to flag as approaching deletion
    enableRetentionWarningEmail: "false"  # Send warning emails via Graph API before deletion

    # Data Sovereignty Warnings
    enableDataWarnings: "True"

    # Storage Provider
    # Set to "s3" to use S3-compatible object storage for file uploads
    # Leave empty for default local storage (PVC)
    storageProvider: ""
    s3BucketName: ""
    s3RegionName: ""
    s3EndpointUrl: ""             # For S3-compatible storage (e.g., https://object.previder.nl)
    s3KeyPrefix: ""               # Optional prefix for all keys
    s3EnableTagging: "false"
    # Set to "false" only when the S3 endpoint presents a non-validating cert
    # (e.g. self-signed without IP SAN). Empty/unset preserves boto3's default
    # verification. Used on nebul-prod where the NetApp ONTAP MinIO front
    # cert has no SAN matching 10.0.17.31.
    s3VerifySsl: ""

    # Easter Eggs (disabled)
    enableEasterEggs: "false"

    # Telemetry (disabled)
    scarfNoAnalytics: "true"
    doNotTrack: "true"
    anonymizedTelemetry: "false"

    # OpenTelemetry Configuration
    telemetry:
      otel:
        enabled: false
        traces: true
        metrics: true
        logs: true
        endpoint: "http://alloy.observability.svc:4317"
        serviceName: "open-webui"
        insecure: true
        sampler: "parentbased_always_on"
        protocol: "grpc"  # grpc or http
        resourceAttributes: ""  # key1=val1,key2=val2
        # Multi-tenant configuration
        tenantId: "soev"  # X-Scope-OrgID for observability backends

    # Custom Prompts
    queryGenerationPromptTemplate: |
      ### Task:
      Analyze the chat history to determine the necessity of generating search queries, in the given language. By default, **prioritize generating 1-3 broad and relevant search queries** unless it is absolutely certain that no additional information is required. The aim is to retrieve comprehensive, updated, and valuable information even with minimal uncertainty. If no search is unequivocally needed, return an empty list.

      ### Guidelines:
      - Respond **EXCLUSIVELY** with a JSON object. Any form of extra commentary, explanation, or additional text is strictly prohibited.
      - When generating search queries, respond in the format: { "queries": ["query1", "query2"] }, ensuring each query is distinct, concise, and relevant to the topic.
      - If and only if it is entirely certain that no useful results can be retrieved by a search, return: { "queries": [] }.
      - Err on the side of suggesting search queries if there is **any chance** they might provide useful or updated information.
      - Be concise and focused on composing high-quality search queries, avoiding unnecessary elaboration, commentary, or assumptions.
      - Generate queries in the EXACT SAME language as the user's most recent message. If the user writes in Dutch, queries MUST be in Dutch. If in English, queries MUST be in English.
      - Today's date is: {{CURRENT_DATE}}.
      - Always prioritize providing actionable and broad queries that maximize informational coverage.

      ### Output:
      Strictly return in JSON format:
      {
        "queries": ["query1", "query2"]
      }

      ### Chat History:
      <chat_history>
      {{MESSAGES:END:6}}
      </chat_history>

# -----------------------------------------------------------------------------
# PostgreSQL
# -----------------------------------------------------------------------------
postgres:
  enabled: true

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  # Resource limits — no CPU limit; memory limit kept.
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"

  # Persistent storage
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce

  # Database configuration
  database: openwebui
  user: openwebui
  # password is set via secrets

# -----------------------------------------------------------------------------
# Weaviate (Vector Database)
# -----------------------------------------------------------------------------
weaviate:
  enabled: true

  image:
    repository: semitechnologies/weaviate
    tag: "1.35.0"
    pullPolicy: IfNotPresent

  # Resource limits — no CPU limit; memory limit kept.
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "4Gi"

  # Persistent storage
  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce

  # Weaviate configuration
  config:
    queryDefaults:
      limit: 25
    authentication:
      anonymous_access:
        enabled: true
    persistence:
      dataPath: "/var/lib/weaviate"
    defaultVectorizerModule: "none"
    enableModules: "backup-filesystem"
    backupFilesystemPath: "/var/lib/weaviate/backups"
    clusterHostname: "node1"

# -----------------------------------------------------------------------------
# Redis (shared state for multi-replica Open WebUI: websockets, session,
# in-memory config cache). Required by Open WebUI for replicaCount > 1.
# Stateless — emptyDir only; a restart drops active websocket connections
# but causes no data loss. Single replica is sufficient per the official
# Open WebUI scaling docs.
# -----------------------------------------------------------------------------
redis:
  enabled: false

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"

  podSecurityContext: {}
  securityContext: {}

# -----------------------------------------------------------------------------
# Loader Worker (per-tenant orchestrator for cloud-source ingestion)
# -----------------------------------------------------------------------------
# Runs in the tenant namespace. Receives jobs from open-webui (same ns,
# NetworkPolicy-gated, no bearer), downloads cloud bytes, calls
# shared-services gradient-doc-processor for parse+chunk, embeds via LiteLLM
# using the tenant's existing openaiApiKey, and pushes embedded chunks back
# to /api/v1/integrations/ingest with LOADER_INGEST_API_KEY + acting headers.
#
# Image source: genai-utils/api/gateway/loader_worker (built via build-services CI).
loaderWorker:
  enabled: false

  image:
    repository: ghcr.io/gradient-ds/gradient-loader-worker
    tag: ""
    pullPolicy: Always

  replicaCount: 1

  service:
    port: 8002

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 75

  config:
    port: 8002
    logLevel: "INFO"
    docProcessorUrl: "http://gradient-doc-processor.shared-services.svc:8001"
    litellmBaseUrl: "http://litellm-proxy.shared-services.svc:4000/v1"
    maxConcurrentJobsPerReplica: 4
    perJobItemConcurrency: 5
    jobLeaseTimeoutSeconds: 900
    embedderBatchSize: 100

  # Postgres lives on the existing tenant Postgres pod; create a new database
  # via the bootstrap Job (templates/loader-worker/postgres-bootstrap-job.yaml).
  postgres:
    database: "loader_worker"
    user: "loader_worker_app"

  podSecurityContext: {}
  securityContext: {}

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true

# -----------------------------------------------------------------------------
# Secrets
# -----------------------------------------------------------------------------
# These values should be overridden in a separate values file or via --set
secrets:
  # Open WebUI secrets
  webuiSecretKey: ""  # Generate with: openssl rand -hex 32
  openaiApiKey: ""
  ragOpenaiApiKey: ""

  # Google Drive / OAuth (leave empty to disable)
  googleClientSecret: ""
  googleDriveApiKey: ""    # Google Picker API key

  # Microsoft OAuth (leave empty to disable)
  microsoftClientSecret: ""

  # Confluence / Atlassian OAuth (leave empty to disable)
  confluenceOauthClientSecret: ""

  # Email Graph API (leave empty to disable email invites)
  emailGraphClientSecret: ""

  # External Services API Keys (optional)
  externalDocumentLoaderApiKey: ""
  ragExternalRerankerApiKey: ""

  # Agent API X-API-Key (must match AGENTS_API_KEY on the agent service)
  agentApiKey: ""

  # Search API X-API-Key (must match the search-api's expected key)
  searchApiKey: ""

  # Loader-worker → tenant /ingest callback bearer (loader-worker presents this
  # outbound; open-webui validates inbound). Same value, both pods.
  loaderIngestApiKey: ""

  # Loader-worker job DB role password (Postgres role provisioned by the
  # post-install bootstrap Job).
  loaderWorkerDbPassword: ""

  # S3 Storage (only if storageProvider is "s3")
  s3AccessKeyId: ""
  s3SecretAccessKey: ""

  # PostgreSQL
  postgresPassword: ""

# -----------------------------------------------------------------------------
# Agent Search (machine-auth retrieval endpoints)
# -----------------------------------------------------------------------------
# When enabled, mounts:
#   GET  /api/v1/internal/retrieval/accessible-kbs
#   POST /api/v1/internal/retrieval/query
# on the open-webui pod. The agent authenticates by presenting AGENT_API_KEY
# (the same secret used for the open-webui → agent outbound path — single
# shared secret across the per-tenant trust boundary) plus an
# `X-Acting-User-Id` header. Open-webui resolves the user, applies KB-level
# ACL, and serves the response. No new ACL state.
agentSearch:
  enabled: false

# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# External Secrets Operator
# -----------------------------------------------------------------------------
# When enabled, secrets are fetched from 1Password via ESO SDK provider
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  onepassword:
    vault: ""                                    # 1Password vault name (e.g., "soev-octobox")
    itemName: "tenant-secrets"                   # Item name in the vault
    serviceAccountSecret: "onepassword-sa-token" # K8s secret containing SA token
    serviceAccountKey: "token"                   # Key within the K8s secret
    cache: true                                  # Set to false if ESO version doesn't support cache
    cacheTTL: "5m"
    cacheMaxSize: 100
    # Toggle optional fields (set to true if the 1P item contains these)
    fields:
      s3AccessKeyId: false
      emailGraphClientSecret: false
      microsoftClientSecret: false
      googleClientSecret: false
      googleDriveApiKey: false
      confluenceOauthClientSecret: false
      externalDocumentLoaderApiKey: false
      ragExternalRerankerApiKey: false
      agentApiKey: false
      searchApiKey: false
      loaderIngestApiKey: false
      loaderWorkerDbPassword: false

# -----------------------------------------------------------------------------
# Network Policy
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Additional namespaces this tenant is allowed to egress to (in addition to
  # sharedServices.namespace). Useful when sharedServices.namespace is set to
  # a per-env value like staging-shared-services but the tenant also needs to
  # reach the cluster-wide shared-services namespace (e.g. LiteLLM).
  extraEgressNamespaces: []

# -----------------------------------------------------------------------------
# Cilium Network Policy
# -----------------------------------------------------------------------------
# Required on clusters using Cilium Gateway API (e.g., previder-prod).
# Creates a CiliumNetworkPolicy with fromEntities: ingress to allow
# traffic from the Cilium L7 proxy (Envoy) to reach tenant pods.
ciliumNetworkPolicy:
  enabled: false

# -----------------------------------------------------------------------------
# Pod Settings
# -----------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
