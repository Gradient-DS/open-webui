# Per-stack OWUI stateful services for soev multi-stack dev mode.
#
# One copy per active feature-branch worktree, brought up by
# scripts/stack/stack.py alongside the genai-utils per-stack compose.
#
# Ports are published to per-stack-allocated host ports so the stack
# manager works on plain Docker (no OrbStack DNS magic required). Host
# processes (OWUI BE on host, agent on host) reach these via:
#   postgres → localhost:${POSTGRES_PORT}
#   weaviate → localhost:${WEAVIATE_HTTP_PORT}  (HTTP)
#   weaviate → localhost:${WEAVIATE_GRPC_PORT}  (gRPC)
# Port values come from .env.stack-N (env_builder writes them, the
# stack manager passes the file via `docker compose --env-file`).
#
# Image versions and credentials match docker-compose.soev-dev.yaml so
# the OWUI backend running on the host can use identical DATABASE_URL /
# Weaviate connection settings — just swap port numbers per stack via
# the env-builder-generated .env.stack-N.
#
# Legacy single-stack flow continues to use docker-compose.soev-dev.yaml.

name: stack

services:
  weaviate:
    image: semitechnologies/weaviate:1.35.0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      OBJECTS_TTL_DELETE_SCHEDULE: "@every 5m"
      LOG_LEVEL: info
    ports:
      - "${WEAVIATE_HTTP_PORT:?must be set per-stack in .env.stack-N}:8080"
      - "${WEAVIATE_GRPC_PORT:?must be set per-stack in .env.stack-N}:50051"
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: openwebui
      POSTGRES_USER: openwebui
      POSTGRES_PASSWORD: dev_password
    ports:
      - "${POSTGRES_PORT:?must be set per-stack in .env.stack-N}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui -d openwebui"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  weaviate-data: {}
  postgres-data: {}
