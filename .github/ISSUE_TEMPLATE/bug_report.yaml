name: Bug Report
description: Report a bug in soev.ai
title: 'bug: '
labels: ['bug', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        # Bug Report

        Thanks for taking the time to report a bug.

        Before submitting, please check:

        - **Existing issues** in this repository (open AND closed): https://github.com/Gradient-DS/open-webui/issues
        - **Upstream Open WebUI issues** if the bug seems to be in core chat / RAG / model handling: https://github.com/open-webui/open-webui/issues

        For **security vulnerabilities**, please follow [SECURITY.md](https://github.com/Gradient-DS/open-webui/blob/main/SECURITY.md) — do not open a public issue.

  - type: checkboxes
    id: issue-check
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues (open and closed) in this repository.
          required: true
        - label: This bug is in soev.ai-specific functionality (cloud sync, agent API, GDPR features, feature flags, SSO invites, TOTP, Helm chart) — or I have confirmed it is not yet tracked upstream.
          required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      options:
        - Docker / Docker Compose
        - Helm chart (Kubernetes)
        - Local development (npm + pip)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: soev.ai Version / Commit
      description: Image tag, chart version, or git commit hash.
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating System / Platform
      description: e.g. Ubuntu 22.04, macOS 14, Kubernetes 1.29
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if frontend bug)
      description: e.g. Chrome 120, Firefox 121
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Precise, sequential steps. Include relevant config / env vars.
      placeholder: |
        1. Start with `docker compose up -d` and a fresh database.
        2. Set env var X=Y.
        3. Open http://localhost:3000 and sign in.
        4. Navigate to ...
        5. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs & Screenshots
      description: Browser console, backend logs, or screenshots. Redact secrets.
    validations:
      required: false

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Context
    validations:
      required: false
