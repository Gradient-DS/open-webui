name: Feature Request
description: Suggest a feature or improvement for soev.ai
title: 'feat: '
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        # Feature Request

        Before submitting, please check:

        - **Existing issues and discussions** (open AND closed): https://github.com/Gradient-DS/open-webui/issues
        - If the feature belongs in **upstream Open WebUI** (core chat / RAG / model providers), please request it at https://github.com/open-webui/open-webui — improvements there flow back to soev.ai automatically.

        For larger ideas, opening a **discussion** first is often more productive than an issue.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
        - label: This feature fits soev.ai's scope (public-sector compliance, sovereign deployment, organizational integrations) — or I have a clear argument for why it belongs in this fork rather than upstream Open WebUI.
          required: true

  - type: textarea
    id: problem-description
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution-description
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Mockups, links, examples, related issues.
    validations:
      required: false
