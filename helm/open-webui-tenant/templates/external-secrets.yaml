{{- if .Values.externalSecrets.enabled }}
{{- $item := .Values.externalSecrets.onepassword.itemName | default "tenant-secrets" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "open-webui-tenant.fullname" . }}-secrets
  labels:
    {{- include "open-webui-tenant.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "open-webui-tenant.fullname" . }}-onepassword
    kind: SecretStore
  target:
    name: {{ include "open-webui-tenant.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: webui-secret-key
      remoteRef:
        key: {{ $item }}/webuiSecretKey
    - secretKey: openai-api-key
      remoteRef:
        key: {{ $item }}/openaiApiKey
    - secretKey: rag-openai-api-key
      remoteRef:
        key: {{ $item }}/ragOpenaiApiKey
    - secretKey: postgres-password
      remoteRef:
        key: {{ $item }}/postgresPassword
    {{- if .Values.externalSecrets.onepassword.fields.s3AccessKeyId }}
    - secretKey: s3-access-key-id
      remoteRef:
        key: {{ $item }}/s3AccessKeyId
    - secretKey: s3-secret-access-key
      remoteRef:
        key: {{ $item }}/s3SecretAccessKey
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.emailGraphClientSecret }}
    - secretKey: email-graph-client-secret
      remoteRef:
        key: {{ $item }}/emailGraphClientSecret
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.microsoftClientSecret }}
    - secretKey: microsoft-client-secret
      remoteRef:
        key: {{ $item }}/microsoftClientSecret
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.googleClientSecret }}
    - secretKey: google-client-secret
      remoteRef:
        key: {{ $item }}/googleClientSecret
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.googleDriveApiKey }}
    - secretKey: google-drive-api-key
      remoteRef:
        key: {{ $item }}/googleDriveApiKey
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.externalDocumentLoaderApiKey }}
    - secretKey: external-document-loader-api-key
      remoteRef:
        key: {{ $item }}/externalDocumentLoaderApiKey
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.ragExternalRerankerApiKey }}
    - secretKey: rag-external-reranker-api-key
      remoteRef:
        key: {{ $item }}/ragExternalRerankerApiKey
    {{- end }}
    {{- if .Values.externalSecrets.onepassword.fields.agentApiKey }}
    - secretKey: agent-api-key
      remoteRef:
        key: {{ $item }}/agentApiKey
    {{- end }}
{{- end }}
