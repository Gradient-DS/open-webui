name: Build and publish Soev Docker image

on:
  push:
    branches:
      - main
      - dev
      - test
    tags:
      - 'v*'
      - 'chart-v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-slim-image:
    # Skip image rebuild on chart-only release tags so we don't overwrite
    # the image that prod tenants pull via ImagePolicy.
    if: "!startsWith(github.ref, 'refs/tags/chart-v')"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=git-
            type=semver,pattern={{version}},prefix=v
            type=raw,enable=${{ github.ref == 'refs/heads/main' }},value=latest
            type=raw,value=${{ github.ref_name }}-{{sha}}-${{ github.run_number }}
          flavor: |
            latest=false

      - name: Extract metadata for Docker cache
        id: cache-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=main,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          flavor: |
            prefix=cache-slim-${{ matrix.platform }}-
            latest=false

      - name: Build Docker image (slim)
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.FULL_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ steps.cache-meta.outputs.tags }}
          cache-to: type=registry,ref=${{ steps.cache-meta.outputs.tags }},mode=max
          build-args: |
            BUILD_HASH=${{ github.sha }}
            USE_SLIM=true
            UID=1000
            GID=1000

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-slim-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-slim-images:
    if: "!startsWith(github.ref, 'refs/tags/chart-v')"
    runs-on: ubuntu-latest
    needs: [build-slim-image]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-slim-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=git-
            type=semver,pattern={{version}},prefix=v
            type=raw,enable=${{ github.ref == 'refs/heads/main' }},value=latest
            type=raw,value=${{ github.ref_name }}-{{sha}}-${{ github.run_number }}
          flavor: |
            latest=false

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.FULL_IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.FULL_IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  publish-helm-chart:
    # Run after image jobs succeed OR when they were skipped (chart-only tag).
    if: ${{ !cancelled() && (needs.merge-slim-images.result == 'success' || needs.merge-slim-images.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs: [merge-slim-images]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute chart version
        id: version
        run: |
          # chart-v<X.Y.Z> tag  -> stable chart X.Y.Z (image jobs skipped above)
          # v<X.Y.Z> tag        -> stable chart X.Y.Z alongside image release
          # branch push         -> prerelease 1.0.<run>-<branch>.<sha>
          #                        (ignored by prod pins, picked up by test filter)
          if [[ "${GITHUB_REF}" == refs/tags/chart-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/chart-v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep '^version:' helm/open-webui-tenant/Chart.yaml | awk '{print $2}')
            MAJOR_MINOR=$(echo "$BASE" | cut -d. -f1-2)
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="${MAJOR_MINOR}.${{ github.run_number }}-${GITHUB_REF_NAME}.${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing chart version: ${VERSION}"

      - name: Update appVersion in Chart.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/^appVersion:.*/appVersion: \"${SHORT_SHA}\"/" helm/open-webui-tenant/Chart.yaml

      - name: Lint chart
        run: helm lint helm/open-webui-tenant

      - name: Package chart
        run: helm package helm/open-webui-tenant --version ${{ steps.version.outputs.version }}

      - name: Push chart to GHCR
        run: helm push open-webui-tenant-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/gradient-ds/charts
