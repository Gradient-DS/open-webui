<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>{{ title }}</title>
		<style>
			@page {
				size: A4;
				margin: 25mm 20mm 25mm 20mm;
				@bottom-center {
					content: 'Pagina ' counter(page) ' van ' counter(pages);
					font-size: 9pt;
					color: #666;
				}
			}
			body {
				font-family: 'Noto Sans', 'Arial', sans-serif;
				font-size: 11pt;
				line-height: 1.5;
				color: #1a1a1a;
			}
			h1 {
				font-size: 22pt;
				margin-bottom: 6mm;
			}
			h2 {
				font-size: 16pt;
				margin-top: 8mm;
				margin-bottom: 4mm;
			}
			h3 {
				font-size: 13pt;
				margin-top: 6mm;
				margin-bottom: 3mm;
			}
			h4,
			h5,
			h6 {
				font-size: 11pt;
				margin-top: 4mm;
				margin-bottom: 2mm;
			}
			p {
				margin: 0 0 3mm 0;
			}
			ul,
			ol {
				margin: 0 0 3mm 6mm;
			}
			li {
				margin-bottom: 1mm;
			}
			table {
				border-collapse: collapse;
				width: 100%;
				margin: 4mm 0;
				font-size: 10pt;
			}
			th,
			td {
				border: 1px solid #ccc;
				padding: 3mm 4mm;
				text-align: left;
			}
			th {
				background-color: #f5f5f5;
				font-weight: bold;
			}
			pre {
				background-color: #f6f8fa;
				border-radius: 4px;
				padding: 4mm;
				overflow: auto;
				font-size: 9pt;
				font-family: 'Courier New', monospace;
			}
			code {
				font-family: 'Courier New', monospace;
				font-size: 9pt;
			}
			blockquote {
				border-left: 3px solid #ddd;
				padding-left: 4mm;
				color: #555;
				margin: 3mm 0;
			}
			img {
				max-width: 100%;
			}
		</style>
	</head>
	<body>
		{{ body | safe }}
	</body>
</html>
