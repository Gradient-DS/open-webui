{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "open-webui-tenant.fullname" . }}-onepassword
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "open-webui-tenant.labels" . | nindent 4 }}
spec:
  provider:
    onepasswordSDK:
      vault: {{ .Values.externalSecrets.onepassword.vault | quote }}
      auth:
        serviceAccountSecretRef:
          name: {{ .Values.externalSecrets.onepassword.serviceAccountSecret | default "onepassword-sa-token" }}
          key: {{ .Values.externalSecrets.onepassword.serviceAccountKey | default "token" }}
      {{- if .Values.externalSecrets.onepassword.cache | default true }}
      cache:
        ttl: {{ .Values.externalSecrets.onepassword.cacheTTL | default "5m" }}
        maxSize: {{ .Values.externalSecrets.onepassword.cacheMaxSize | default 100 }}
      {{- end }}
{{- end }}
