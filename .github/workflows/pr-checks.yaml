name: PR Quality Gates

on:
  pull_request:
    branches:
      - dev
      - test
      - main

jobs:
  frontend-build:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci --force

      - name: Build Frontend
        run: npm run build

      - name: Run Frontend Unit Tests
        run: npm run test:frontend

  backend-lint:
    name: Backend Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get changed Python files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- 'backend/**.py' | xargs)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Ruff check
        if: steps.changed.outputs.files != ''
        uses: astral-sh/ruff-action@v3
        with:
          args: check ${{ steps.changed.outputs.files }}

      - name: Ruff format
        if: steps.changed.outputs.files != ''
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check ${{ steps.changed.outputs.files }}

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r backend/requirements.txt

      - name: Run pytest (working tests only)
        env:
          WEBUI_SECRET_KEY: test-secret-key
        run: |
          source .venv/bin/activate
          cd backend
          PYTHONPATH=. pytest \
            open_webui/test/util/test_features.py \
            -v --tb=short

  helm-lint:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Lint Helm chart
        run: helm lint helm/open-webui-tenant

      - name: Template Helm chart (catch rendering errors)
        run: helm template test-release helm/open-webui-tenant > /dev/null

  docker-build:
    name: Docker Image Build (no push)
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (slim, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: open-webui:pr-test
          build-args: |
            BUILD_HASH=${{ github.sha }}
            USE_SLIM=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
